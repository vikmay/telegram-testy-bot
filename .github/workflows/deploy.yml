name: Deploy Telegram Testy Bot

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy to VM via SSH
              uses: appleboy/ssh-action@v1.0.0
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: ${{ secrets.VM_USER }}
                  key: ${{ secrets.VM_SSH_KEY }}

                  script: |
                      set -euo pipefail

                      REPO_DIR="/home/ubuntu/telegram-testy-bot"
                      SERVICE_NAME="telegram-testy-bot"
                      BRANCH="main"

                      mkdir -p "$HOME/.ssh"

                      DEPLOY_KEY_PATH="$HOME/.ssh/deploy_key"

                      echo "${{ secrets.DEPLOY_KEY }}" > "$DEPLOY_KEY_PATH"

                      chmod 600 "$DEPLOY_KEY_PATH"

                      ssh-keyscan -H github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

                      export GIT_SSH_COMMAND="ssh -i $DEPLOY_KEY_PATH -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

                      mkdir -p "$REPO_DIR"

                      # ------------------------------------------------------------------
                      # FIRST DEPLOY
                      # ------------------------------------------------------------------

                      if [ ! -d "$REPO_DIR/.git" ]; then
                        echo "Fresh clone..."

                        rm -rf "$REPO_DIR"

                        git clone \
                          --depth 1 \
                          --branch "$BRANCH" \
                          "${{ secrets.REPO_SSH_URL }}" \
                          "$REPO_DIR"
                      fi

                      cd "$REPO_DIR"

                      # ------------------------------------------------------------------
                      # TOKEN SAFETY
                      # ------------------------------------------------------------------

                      if [ ! -f token.txt ] && [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
                        echo "${{ secrets.TELEGRAM_BOT_TOKEN }}" > token.txt
                        chmod 600 token.txt || true
                      fi

                      # ------------------------------------------------------------------
                      # PRESERVE LOCAL JSON FILES
                      # ------------------------------------------------------------------

                      QUESTIONS_BAK="$(mktemp)"
                      TOPICS_BAK="$(mktemp)"

                      if [ -f data/questions.json ]; then
                        cp data/questions.json "$QUESTIONS_BAK"
                      fi

                      if [ -f data/topics.json ]; then
                        cp data/topics.json "$TOPICS_BAK"
                      fi

                      # ------------------------------------------------------------------
                      # UPDATE REPO
                      # ------------------------------------------------------------------

                      git fetch --prune origin "$BRANCH"

                      # force sync with remote
                      git reset --hard "origin/$BRANCH"

                      # clean untracked files but preserve runtime data
                      git clean -fd \
                        -e token.txt \
                        -e venv \
                        -e "*.db" \
                        -e "data/state.json"

                      # ------------------------------------------------------------------
                      # RESTORE LOCAL JSON FILES
                      # ------------------------------------------------------------------

                      mkdir -p data

                      if [ -s "$QUESTIONS_BAK" ]; then
                        cp "$QUESTIONS_BAK" data/questions.json
                      fi

                      if [ -s "$TOPICS_BAK" ]; then
                        cp "$TOPICS_BAK" data/topics.json
                      fi

                      rm -f "$QUESTIONS_BAK" "$TOPICS_BAK"

                      # ------------------------------------------------------------------
                      # PYTHON VENV
                      # ------------------------------------------------------------------

                      if [ ! -x "$REPO_DIR/venv/bin/python" ]; then
                        echo "Creating venv..."

                        sudo -H python3 -m venv "$REPO_DIR/venv"
                      fi

                      # ------------------------------------------------------------------
                      # INSTALL DEPENDENCIES
                      # ------------------------------------------------------------------

                      if [ -f requirements.txt ]; then
                        "$REPO_DIR/venv/bin/pip" install -r requirements.txt
                      fi

                      # ------------------------------------------------------------------
                      # RESTART SERVICE
                      # ------------------------------------------------------------------

                      echo "Restarting service: $SERVICE_NAME"

                      sudo systemctl restart "$SERVICE_NAME"

                      echo "Deploy complete"
